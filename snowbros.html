<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NINJA BROS</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { height:100%; background:#070612; display:flex; align-items:center;
    justify-content:center; font-family:"Courier New",monospace; overflow:hidden; }
  #wrap { position:relative; }
  canvas { display:block; border:3px solid #6cf;
    box-shadow:0 0 28px rgba(120,160,255,.5); image-rendering:pixelated; }
  #hud { position:absolute; top:6px; left:12px; right:12px; display:flex;
    justify-content:space-between; color:#cfe; font-size:14px; letter-spacing:1px;
    text-shadow:0 0 6px #6cf; pointer-events:none; }
  #overlay { position:absolute; inset:0; display:flex; flex-direction:column;
    align-items:center; justify-content:center; text-align:center; gap:14px;
    background:rgba(8,6,18,.86); color:#cfe; padding:24px; }
  #overlay.hidden { display:none; }
  #overlay h1 { font-size:38px; color:#9df; text-shadow:0 0 14px #6cf; letter-spacing:3px; }
  #overlay p { font-size:14px; line-height:1.9; }
  .blink { color:#ffd23b; text-shadow:0 0 10px #ffd23b; animation:b 1s steps(2) infinite; }
  @keyframes b { to { visibility:hidden; } }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game" width="640" height="480"></canvas>
  <div id="hud"><span id="info">STAGE 1</span><span id="lives">♥♥♥</span></div>
  <div id="overlay">
    <h1>🥷 NINJA BROS 🥷</h1>
    <p>
      표창을 던져 <b>도깨비</b>들을 쓰러뜨리세요!<br>
      <b>✦</b> 사정거리 업 · <b>⚔</b> 무기강화(3연발) 아이템을 모으세요.<br>
      도깨비도 사다리를 타고 움직이며, 4스테이지마다 <b>보스</b>가 나타납니다.<br><br>
      이동 <b>← →</b> · 점프/2단점프 <b>Z</b> · 사다리 <b>↑ ↓</b> · 표창 <b>X / Space</b>
    </p>
    <p class="blink">PRESS SPACE TO START</p>
  </div>
</div>
<script>
const cv=document.getElementById('game'), ctx=cv.getContext('2d');
const W=cv.width, H=cv.height;
const infoEl=document.getElementById('info'), livesEl=document.getElementById('lives');
const overlay=document.getElementById('overlay');

// ========== 사운드 ==========
let AC=null;
function initAudio(){ if(!AC){ try{ AC=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} }
  if(AC&&AC.state==='suspended') AC.resume(); }
function tone(freq,dur,type='square',vol=0.14,slideTo){
  if(!AC)return; const t=AC.currentTime;
  const o=AC.createOscillator(), g=AC.createGain();
  o.type=type; o.frequency.setValueAtTime(freq,t);
  if(slideTo) o.frequency.exponentialRampToValueAtTime(Math.max(20,slideTo),t+dur);
  g.gain.setValueAtTime(vol,t); g.gain.exponentialRampToValueAtTime(0.0008,t+dur);
  o.connect(g); g.connect(AC.destination); o.start(t); o.stop(t+dur+0.02);
}
function sfx(k){
  switch(k){
    case 'shoot': tone(880,0.08,'square',0.10,420); break;
    case 'jump':  tone(320,0.12,'square',0.12,720); break;
    case 'hit':   tone(220,0.06,'sawtooth',0.10,150); break;
    case 'kill':  tone(180,0.18,'triangle',0.16,60); tone(360,0.1,'square',0.08,90); break;
    case 'item':  tone(600,0.08,'square',0.10); setTimeout(()=>tone(900,0.08,'square',0.10),70);
                  setTimeout(()=>tone(1300,0.12,'square',0.10),150); break;
    case 'power': [440,587,740,988].forEach((f,i)=>setTimeout(()=>tone(f,0.1,'square',0.12),i*60)); break;
    case 'hurt':  tone(420,0.3,'sawtooth',0.2,70); break;
    case 'stage': [523,659,784,1047].forEach((f,i)=>setTimeout(()=>tone(f,0.14,'triangle',0.14),i*90)); break;
    case 'boss':  tone(70,0.6,'sawtooth',0.22,40); setTimeout(()=>tone(90,0.5,'square',0.12,50),120); break;
    case 'efire': tone(300,0.1,'sawtooth',0.08,120); break;
  }
}
const MEL=[330,392,494,392,440,392,330,294], BASS=[110,110,147,98];
let melI=0, melT=0, basI=0, basT=0;
function music(){ if(!AC)return;
  if(--melT<=0){ tone(MEL[melI%MEL.length],0.16,'triangle',0.045); melI++; melT=24; }
  if(--basT<=0){ tone(BASS[basI%BASS.length],0.30,'sine',0.06); basI++; basT=96; } }

// ========== 입력 ==========
// 점프 = Z (사다리 ↑↓ 와 충돌 안 하도록 분리). 사다리 밖에선 ↑도 점프 가능.
const keys={}; let justJumpZ=false, justUp=false, justShoot=false;
addEventListener('keydown',e=>{
  initAudio();
  if(['ArrowLeft','ArrowRight','ArrowUp','ArrowDown','Space'].includes(e.code)) e.preventDefault();
  if(!keys[e.code] && e.code==='KeyZ') justJumpZ=true;
  if(!keys[e.code] && e.code==='ArrowUp') justUp=true;
  if(state==='play' && !keys[e.code] && (e.code==='KeyX'||e.code==='Space')) justShoot=true;
  keys[e.code]=true;
  if(e.code==='Space' && state!=='play') start();
});
addEventListener('keyup',e=>{ keys[e.code]=false; });

// ========== 상수 ==========
const GRAV=0.5, MOVE=1.4, JUMP=-9.0, CLIMB=1.6, ECLIMB=0.9;
const GROUND_Y=456;
const RANGE_SHORT=130, RANGE_LONG=300, RANGE_TIME=420, POWER_TIME=420;
const SPAWN_INVULN=120;

// ========== 적 종류 (도깨비) — 더 느리게 ==========
const ETYPES={
  red:    {col:'#d8453b', speed:0.6,  hp:2, ranged:false}, // 기본 patrol
  blue:   {col:'#3b8fd8', speed:0.9,  hp:2, ranged:false}, // 깡총 점프형
  green:  {col:'#46aa5a', speed:0.45, hp:4, ranged:false}, // 단단함
  purple: {col:'#a14fd8', speed:0.55, hp:3, ranged:true },  // 공격(투척)
};

// ========== 스테이지 지형 ==========
const G={x:0,y:GROUND_Y,w:640,h:24};
const STAGES=[
  { platforms:[G,{x:120,y:340,w:400,h:16},{x:0,y:224,w:300,h:16},{x:340,y:224,w:300,h:16},{x:200,y:108,w:240,h:16}],
    ladders:[{x:300,y:340,w:16,h:116},{x:140,y:224,w:16,h:116},{x:430,y:224,w:16,h:116},{x:300,y:108,w:16,h:116}],
    spots:[[80,300],[440,300],[60,184],[540,184],[300,68],[120,416],[500,416]], pool:['red','blue'] },
  { platforms:[G,{x:0,y:360,w:210,h:16},{x:430,y:360,w:210,h:16},{x:160,y:264,w:320,h:16},{x:0,y:168,w:210,h:16},{x:430,y:168,w:210,h:16}],
    ladders:[{x:90,y:360,w:16,h:96},{x:535,y:360,w:16,h:96},{x:300,y:264,w:16,h:192},{x:90,y:168,w:16,h:96},{x:535,y:168,w:16,h:96}],
    spots:[[60,320],[540,320],[300,224],[60,128],[540,128],[120,416],[500,416]], pool:['red','blue','green'] },
  { platforms:[G,{x:60,y:372,w:130,h:16},{x:450,y:372,w:130,h:16},{x:250,y:330,w:140,h:16},{x:30,y:228,w:160,h:16},{x:450,y:228,w:160,h:16},{x:240,y:150,w:160,h:16}],
    ladders:[{x:115,y:372,w:16,h:84},{x:505,y:372,w:16,h:84},{x:312,y:330,w:16,h:126},{x:100,y:228,w:16,h:144},{x:510,y:228,w:16,h:144},{x:312,y:150,w:16,h:180}],
    spots:[[100,332],[490,332],[300,290],[80,188],[510,188],[300,110],[120,416],[500,416]], pool:['red','green','purple'] },
  { platforms:[G,{x:0,y:300,w:190,h:16},{x:450,y:380,w:190,h:16},{x:230,y:340,w:170,h:16},{x:120,y:210,w:170,h:16},{x:400,y:200,w:200,h:16},{x:250,y:96,w:150,h:16}],
    ladders:[{x:90,y:300,w:16,h:156},{x:520,y:380,w:16,h:76},{x:300,y:340,w:16,h:116},{x:180,y:210,w:16,h:130},{x:470,y:200,w:16,h:180},{x:300,y:96,w:16,h:114}],
    spots:[[60,260],[520,340],[300,300],[160,170],[470,160],[300,56],[120,416],[500,416]], pool:['red','blue','green','purple'] },
];
const BOSS_LAYOUT={
  platforms:[G,{x:0,y:300,w:150,h:16},{x:490,y:300,w:150,h:16},{x:230,y:200,w:180,h:16}],
  ladders:[{x:70,y:300,w:16,h:156},{x:560,y:300,w:16,h:156},{x:312,y:200,w:16,h:256}],
  spots:[[80,260],[520,260]] };

// ========== 상태 ==========
let state='title', stage, lives, player;
let enemies, shots, eShots, items, particles, platforms, ladders;

function mkEnemy(x,y,tn){ const t=ETYPES[tn];
  return {x,y,w:24,h:24,dir:(Math.random()<.5?-1:1),spd:t.speed,vx:0,vy:0,onGround:false,
    type:tn,hp:t.hp,maxhp:t.hp,fireCd:90+Math.random()*90,slowT:0,flash:0,
    climbing:false,climbDir:0,climbCd:90+Math.random()*150,hopCd:60+Math.random()*90}; }
function spawnBoss(){ const hp=16+stage*2;
  enemies.push({boss:true,x:W/2-28,y:130,w:56,h:56,dir:1,spd:0.5,vx:0,vy:0,onGround:false,
    hp,maxhp:hp,fireCd:80,jumpCd:140,slowT:0,flash:0,ft:0}); }
function reset(full){
  if(full){ stage=1; lives=3; }
  player={x:W/2-10,y:GROUND_Y-30,w:20,h:30,vx:0,vy:0,onGround:false,face:1,
          invuln:SPAWN_INVULN,walkT:0,jumps:2,climbing:false,rangeT:0,powerT:0};
  shots=[]; eShots=[]; items=[]; particles=[];
  loadStage();
}
function loadStage(){
  const isBoss=(stage%4===0);
  const sd = isBoss ? BOSS_LAYOUT : STAGES[(stage-1)%STAGES.length];
  platforms=sd.platforms; ladders=sd.ladders; enemies=[];
  if(isBoss){ spawnBoss(); enemies.push(mkEnemy(80,260,'red')); enemies.push(mkEnemy(536,260,'red')); }
  else {
    const pool = stage>=5 ? ['red','blue','green','purple'] : sd.pool;
    const n=Math.min(8, 3+stage);
    const spots=sd.spots.filter(s=>!(Math.abs(s[0]-310)<80 && s[1]>380)).sort(()=>Math.random()-0.5);
    for(let i=0;i<n;i++){ const s=spots[i%spots.length];
      enemies.push(mkEnemy(s[0],s[1],pool[Math.floor(Math.random()*pool.length)])); }
  }
}
function start(){ initAudio(); reset(true); state='play'; overlay.classList.add('hidden'); }
function nextStage(){
  stage++; player.x=W/2-10; player.y=GROUND_Y-30; player.vy=0; player.invuln=SPAWN_INVULN; player.climbing=false;
  shots=[]; eShots=[]; items=[]; loadStage();
  if(stage%4===0){ banner('BOSS 도깨비왕!','#ff5a7a'); sfx('boss'); }
  else { banner('STAGE '+stage,'#9df'); sfx('stage'); }
}
function gameOver(){
  state='over'; overlay.classList.remove('hidden');
  overlay.innerHTML='<h1 style="color:#ff6b9d;text-shadow:0 0 14px #ff6b9d">GAME OVER</h1>'+
    '<p>도달 스테이지 <b style="color:#9df">'+stage+'</b></p>'+
    '<p class="blink">PRESS SPACE TO RETRY</p>';
}
let bannerTxt='',bannerCol='',bannerT=0;
function banner(t,c){ bannerTxt=t; bannerCol=c; bannerT=100; }

// ========== 물리 ==========
function overlap(a,b){ return a.x<b.x+b.w && a.x+a.w>b.x && a.y<b.y+b.h && a.y+a.h>b.y; }
function moveX(e){
  e.x+=e.vx; e.hitWall=false;
  for(const p of platforms){ if(overlap(e,p)){
    if(e.vx>0){e.x=p.x-e.w;} else if(e.vx<0){e.x=p.x+p.w;} e.hitWall=true; }}
  if(e.x<0){e.x=0;e.hitWall=true;} if(e.x+e.w>W){e.x=W-e.w;e.hitWall=true;}
}
function moveY(e){
  e.vy+=GRAV; if(e.vy>14)e.vy=14;
  e.y+=e.vy; e.onGround=false;
  for(const p of platforms){ if(overlap(e,p)){
    if(e.vy>0){e.y=p.y-e.h;e.vy=0;e.onGround=true;} else if(e.vy<0){e.y=p.y+p.h;e.vy=0;} }}
}
function ladderAt(cx,top,h){ for(const l of ladders){
  if(cx> l.x-2 && cx< l.x+l.w+2 && top+h> l.y && top< l.y+l.h) return l; } return null; }
function burst(x,y,c,n){ for(let i=0;i<n;i++){const a=Math.random()*6.28,s=1+Math.random()*3;
  particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-1,life:18+Math.random()*12,c});} }

// ========== 업데이트 ==========
function update(){
  if(state!=='play') return;
  music();
  if(bannerT>0)bannerT--;
  const p=player;

  // 이동
  p.vx=0;
  if(keys['ArrowLeft']){p.vx=-MOVE;p.face=-1;}
  if(keys['ArrowRight']){p.vx=MOVE;p.face=1;}

  // 사다리
  const probe={x:p.x+4,y:p.y,w:p.w-8,h:p.h+8};
  let lad=null; for(const l of ladders){ if(overlap(probe,l)){ lad=l; break; } }
  if(lad && (keys['ArrowUp']||keys['ArrowDown'])) p.climbing=true;
  if(!lad) p.climbing=false;

  if(p.climbing){
    p.vy=0; p.onGround=false;
    if(keys['ArrowUp']) p.y-=CLIMB;
    if(keys['ArrowDown']) p.y+=CLIMB;
    if(p.y+p.h > lad.y+lad.h) p.y=lad.y+lad.h-p.h;
    moveX(p);
    if(justJumpZ){ p.climbing=false; p.vy=JUMP; p.jumps=1; sfx('jump'); }  // 점프는 Z로
  } else {
    if(p.onGround) p.jumps=2;
    const wantJump = justJumpZ || justUp;     // 사다리 밖에선 ↑도 점프
    if(wantJump && p.jumps>0){ p.vy=JUMP; p.jumps--; sfx('jump'); }
    moveX(p); moveY(p);
  }
  justJumpZ=false; justUp=false;
  if(p.invuln>0)p.invuln--;
  if(p.rangeT>0)p.rangeT--;
  if(p.powerT>0)p.powerT--;
  if((p.vx!==0&&p.onGround)||p.climbing) p.walkT++; else p.walkT=0;

  // 표창 발사 (단발) — 강화 시 3연발 + 강한 표창
  if(justShoot){
    const range=p.rangeT>0?RANGE_LONG:RANGE_SHORT, dmg=p.powerT>0?2:1;
    const fx=p.x+(p.face>0?p.w-2:-6);
    const offs = p.powerT>0 ? [-7,0,7] : [0];
    for(const o of offs)
      shots.push({x:fx,y:p.y+12+o,vx:p.face*5,vy:0,rot:0,traveled:0,max:range,phase:'fly',dmg});
    justShoot=false; sfx('shoot');
  }
  for(let i=shots.length-1;i>=0;i--){
    const s=shots[i]; s.rot+=0.5;
    if(s.phase==='fly'){ s.x+=s.vx; s.traveled+=Math.abs(s.vx); if(s.traveled>=s.max)s.phase='fall'; }
    else { s.vy+=GRAV*0.7; s.x+=s.vx*0.4; s.y+=s.vy; }
    if(s.x<-14||s.x>W+14||s.y>H+20){ shots.splice(i,1); continue; }
    const sb={x:s.x-6,y:s.y-6,w:12,h:12}; let hit=false;
    for(let j=enemies.length-1;j>=0;j--){
      if(overlap(sb,enemies[j])){
        const e=enemies[j]; e.hp-=(s.dmg||1); e.slowT=120; e.flash=8; hit=true;
        if(e.hp<=0) killEnemy(j); else { burst(s.x,s.y,'#bfe3ff',5); sfx('hit'); }
        break;
      }
    }
    if(hit) shots.splice(i,1);
  }

  // 적
  for(let i=enemies.length-1;i>=0;i--){
    const e=enemies[i];
    if(e.boss){ updateBoss(e); }
    else {
      const t=ETYPES[e.type];
      const ecx=e.x+e.w/2;
      const elad=ladderAt(ecx,e.y,e.h);
      if(e.flash>0)e.flash--;
      if(e.slowT>0)e.slowT--;
      if(e.climbing){
        e.vy=0; e.onGround=false;
        e.y += e.climbDir*ECLIMB*(e.slowT>0?0.4:1);
        if(!elad) e.climbing=false;
        else if(e.climbDir<0 && e.y <= elad.y-2){ e.climbing=false; }       // 위 끝
        else if(e.climbDir>0 && e.y+e.h >= elad.y+elad.h-2){ e.climbing=false; } // 아래 끝
      } else {
        e.vx=e.dir*e.spd*(e.slowT>0?0.4:1);
        moveX(e); if(e.hitWall)e.dir*=-1; moveY(e);
        // 파랑: 깡총 점프
        if(e.type==='blue' && e.onGround){ e.hopCd--; if(e.hopCd<=0){ e.vy=-6; e.hopCd=70+Math.random()*80; } }
        // 사다리 타기 결정 (위/아래로 다양하게 이동)
        e.climbCd--;
        if(elad && e.onGround && e.climbCd<=0 && Math.random()<0.6){
          e.climbing=true; e.x=elad.x+elad.w/2-e.w/2;
          e.climbDir = (player.y < e.y-4) ? -1 : (player.y > e.y+4 ? 1 : (Math.random()<.5?-1:1));
          if(e.climbDir>0 && e.y+e.h>=elad.y+elad.h-3) e.climbDir=-1;
          if(e.climbDir<0 && e.y<=elad.y+3) e.climbDir=1;
          e.climbCd=160+Math.random()*200;
        }
        // 공격형: 수평 일직선
        if(t.ranged){ e.fireCd--;
          if(e.fireCd<=0 && e.onGround){ const dir=(player.x>e.x)?1:-1;
            eShots.push({x:e.x+12,y:e.y+8,vx:dir*2.4,vy:0,w:10,h:10}); e.fireCd=150+Math.random()*60; sfx('efire'); } }
      }
    }
    if(p.invuln<=0 && overlap(e,p)) hurt();
  }

  // 적 투척물
  for(let i=eShots.length-1;i>=0;i--){
    const s=eShots[i]; s.x+=s.vx; s.y+=s.vy;
    if(s.x<-12||s.x>W+12||s.y<-12||s.y>H+12){ eShots.splice(i,1); continue; }
    if(p.invuln<=0 && overlap(s,p)){ eShots.splice(i,1); hurt(); }
  }
  // 아이템
  for(let i=items.length-1;i>=0;i--){ const it=items[i]; moveY(it);
    if(overlap(it,p)){
      if(it.kind==='power'){ p.powerT=POWER_TIME; sfx('power'); burst(it.x+7,it.y+7,'#ff8a3b',16); }
      else { p.rangeT=RANGE_TIME; sfx('item'); burst(it.x+7,it.y+7,'#ffd23b',16); }
      items.splice(i,1);
    } }
  // 파티클
  for(let i=particles.length-1;i>=0;i--){const q=particles[i];
    q.vy+=0.18; q.x+=q.vx; q.y+=q.vy; q.life--; if(q.life<=0)particles.splice(i,1);}

  if(enemies.length===0 && bannerT<=0) nextStage();
  let extra=''; if(p.rangeT>0)extra+='  ✦거리'; if(p.powerT>0)extra+='  ⚔강화';
  infoEl.textContent='STAGE '+stage+'  적 '+enemies.length+extra;
  livesEl.textContent='♥'.repeat(Math.max(0,lives))+'·'.repeat(Math.max(0,3-lives));
}

function updateBoss(e){
  const p=player;
  e.vx=e.dir*e.spd*(e.slowT>0?0.4:1);
  moveX(e); if(e.hitWall)e.dir*=-1; moveY(e);
  if(e.slowT>0)e.slowT--; if(e.flash>0)e.flash--;
  e.jumpCd--; if(e.jumpCd<=0 && e.onGround){ e.vy=-8.5; e.jumpCd=150+Math.random()*90; }
  e.fireCd--;
  if(e.fireCd<=0){                       // 한 발씩, 높이 번갈아, 느리게 → 회피 가능
    e.ft^=1; const dir=(p.x>e.x)?1:-1; const yy=e.y+(e.ft?12:40);
    eShots.push({x:e.x+22,y:yy,vx:dir*2.1,vy:0,w:12,h:12});
    e.fireCd=120+Math.random()*40; sfx('efire');
  }
}
function killEnemy(j){
  const e=enemies[j];
  burst(e.x+e.w/2,e.y+e.h/2, e.boss?'#a14fd8':ETYPES[e.type].col, e.boss?40:16);
  burst(e.x+e.w/2,e.y+e.h/2,'#fff',e.boss?16:6);
  if(e.boss){ items.push(mkItem(e.x+10,e.y+20,'power')); items.push(mkItem(e.x+e.w-24,e.y+20,'range')); }
  else if(Math.random()<0.32) items.push(mkItem(e.x+e.w/2-7,e.y+e.h/2-7, Math.random()<0.5?'range':'power'));
  enemies.splice(j,1); sfx('kill');
}
function mkItem(x,y,kind){ return {x,y,w:14,h:14,vx:0,vy:0,onGround:false,kind}; }
function hurt(){
  lives--; player.invuln=SPAWN_INVULN; player.climbing=false;
  player.x=W/2-10; player.y=GROUND_Y-30; player.vy=0;
  burst(player.x+10,player.y+15,'#ff6b9d',20); sfx('hurt');
  if(lives<=0)gameOver();
}

// ========== 렌더 ==========
function rect(x,y,w,h,c){ctx.fillStyle=c;ctx.fillRect(x|0,y|0,w,h);}

function cloud(cx,cy){ ctx.beginPath();
  ctx.arc(cx,cy,16,0,6.29); ctx.arc(cx+18,cy+4,13,0,6.29); ctx.arc(cx-18,cy+5,12,0,6.29); ctx.arc(cx+4,cy+8,18,0,6.29); ctx.fill(); }
function ridge(baseY,color,seed,amp){
  ctx.fillStyle=color; ctx.beginPath(); ctx.moveTo(0,H);
  for(let x=0;x<=W;x+=16){ const y=baseY+Math.sin(x*0.018+seed)*amp+Math.sin(x*0.05+seed*2)*amp*0.4; ctx.lineTo(x,y); }
  ctx.lineTo(W,H); ctx.closePath(); ctx.fill(); }
function drawBackground(){
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#0a0f33'); g.addColorStop(0.5,'#241048'); g.addColorStop(1,'#431a3e');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#fff';
  for(let i=0;i<70;i++){ const sx=(i*113)%W, sy=(i*61)%280;
    ctx.globalAlpha=(0.3+0.7*Math.abs(Math.sin(Date.now()/600+i)))*0.8; ctx.fillRect(sx,sy,2,2); }
  ctx.globalAlpha=1;
  const mx=W-104,my=82;
  ctx.fillStyle='rgba(255,190,130,.22)'; ctx.beginPath(); ctx.arc(mx,my,46,0,6.29); ctx.fill();
  ctx.fillStyle='#ffe6a8'; ctx.beginPath(); ctx.arc(mx,my,34,0,6.29); ctx.fill();
  ctx.fillStyle='rgba(180,140,90,.32)';
  ctx.beginPath(); ctx.arc(mx-9,my-6,6,0,6.29); ctx.arc(mx+11,my+9,5,0,6.29); ctx.arc(mx+4,my-12,3,0,6.29); ctx.fill();
  const t=Date.now()/9000; ctx.fillStyle='rgba(40,28,68,.55)';
  for(let i=0;i<3;i++){ const cx=((t*120+i*250)%(W+220))-110; cloud(cx,66+i*34); }
  ridge(300,'#1d1542',0,30); ridge(348,'#150e30',2.3,42);
  for(let i=0;i<5;i++){ const fx=((i*150+Date.now()/45*(i%2?1:-1))%(W+40)+W+40)%(W+40)-20;
    const fy=210+Math.sin(Date.now()/700+i*1.3)*26+i*6;
    ctx.fillStyle='rgba(120,255,190,.16)'; ctx.beginPath(); ctx.arc(fx,fy,12,0,6.29); ctx.fill();
    ctx.fillStyle='rgba(150,255,200,.6)'; ctx.beginPath(); ctx.arc(fx,fy,5,0,6.29); ctx.fill(); }
}

// 발판/바닥 디자인 (기와 + 돌블록 / 흙바닥)
function drawPlatform(pl){
  const ground = pl.h>20;
  // 본체
  if(ground){ rect(pl.x,pl.y,pl.w,pl.h,'#4a3a2a'); rect(pl.x,pl.y+pl.h-6,pl.w,6,'#2e2418');
    ctx.fillStyle='rgba(0,0,0,.25)'; for(let i=0;i<24;i++) ctx.fillRect((pl.x+i*27+ (i%2?9:0))%W,pl.y+8+(i%3)*5,3,3); // 자갈
  } else { rect(pl.x,pl.y,pl.w,pl.h,'#34506e'); rect(pl.x,pl.y+pl.h-4,pl.w,4,'#22354c');
    ctx.strokeStyle='rgba(0,0,0,.18)'; ctx.lineWidth=1;
    for(let bx=pl.x+18; bx<pl.x+pl.w; bx+=26){ ctx.beginPath(); ctx.moveTo(bx,pl.y+4); ctx.lineTo(bx,pl.y+pl.h); ctx.stroke(); } }
  // 기와 윗면 (살짝 돌출)
  for(let tx=pl.x; tx<pl.x+pl.w; tx+=10){
    rect(tx,pl.y-3,9,6,ground?'#6a513a':'#5b7fa8');
    rect(tx,pl.y-3,9,2,ground?'#caa97e':'#bfe3ff');
    rect(tx+8,pl.y-3,2,6,ground?'#3a2c1c':'#2a3d5a');
  }
}

// 닌자 스프라이트
const NINJA_TOP=["...KKK....","..KKKKK...","..RRRRR...","..KKKKK...","..KEKEK...",
 "..KKKKK...",".RKKKKKR..","RKKKKKKK..","..KKKKK...","..KKKKK...","..KKKKK..."];
const NINJA_LEGS={ stand:["..KK.KK...","..KK.KK...","..BB.BB..."],
  walk1:["..KKKK....",".KK..KK...","BB....BB.."], walk2:["...KKKK...","..KK..KK..","..BB...BB."],
  jump:["..KKKKK...",".KK...KK..",".BB...BB.."] };
const NPAL={K:'#21305e',R:'#e23b4e',E:'#7fefff',B:'#0c1024'};
function drawSprite(rows,ox,oy,face){ for(let r=0;r<rows.length;r++){ const row=rows[r];
  for(let c=0;c<row.length;c++){ const col=NPAL[row[c]]; if(!col)continue;
    const cc=face>0?c:(9-c); ctx.fillStyle=col; ctx.fillRect((ox+cc*2)|0,(oy+r*2)|0,2,2); }} }
function drawKatana(ox,oy,face){
  const cx=ox+10, bx=face>0?cx-9:cx+9, tx=face>0?cx+8:cx-8;
  ctx.lineCap='round';
  ctx.strokeStyle='#cfd8e8'; ctx.lineWidth=3; ctx.beginPath(); ctx.moveTo(bx,oy+2); ctx.lineTo(tx,oy+30); ctx.stroke();
  ctx.strokeStyle='#3a4668'; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(bx,oy+2); ctx.lineTo(tx,oy+30); ctx.stroke();
  ctx.strokeStyle='#7a4a23'; ctx.lineWidth=4; ctx.beginPath(); ctx.moveTo(bx,oy-2); ctx.lineTo(bx+(face>0?-1:1)*2,oy+5); ctx.stroke();
  ctx.fillStyle='#e8c64a'; ctx.fillRect(bx-2,oy+4,4,2); ctx.lineCap='butt';
}
function drawNinja(ox,oy,face,pose){ drawKatana(ox,oy,face); drawSprite(NINJA_TOP,ox,oy,face); drawSprite(NINJA_LEGS[pose]||NINJA_LEGS.stand,ox,oy+22,face); }
function drawDokkaebi(e){
  const t=ETYPES[e.type], x=e.x, y=e.y; const flash=e.flash>0&&(e.flash&1);
  ctx.fillStyle='#efe3c0'; ctx.fillRect(x+2,y-5,4,6); ctx.fillRect(x+18,y-5,4,6);
  ctx.fillStyle=flash?'#fff':t.col; ctx.fillRect(x,y,24,24);
  if(e.slowT>0){ ctx.fillStyle='rgba(150,210,255,.4)'; ctx.fillRect(x,y,24,24); }
  ctx.fillStyle='rgba(255,255,255,.18)'; ctx.fillRect(x,y,24,4);
  ctx.fillStyle='#2a0e0e'; ctx.fillRect(x+3,y+5,7,2); ctx.fillRect(x+14,y+5,7,2);
  ctx.fillStyle='#ffd23b'; ctx.fillRect(x+4,y+7,6,5); ctx.fillRect(x+14,y+7,6,5);
  ctx.fillStyle='#000'; ctx.fillRect(x+6,y+8,3,3); ctx.fillRect(x+16,y+8,3,3);
  ctx.fillStyle='#3a0a0a'; ctx.fillRect(x+5,y+16,14,5);
  ctx.fillStyle='#fff'; ctx.fillRect(x+6,y+16,3,4); ctx.fillRect(x+15,y+16,3,4);
  if(e.maxhp>1){ ctx.strokeStyle='rgba(255,255,255,.5)'; ctx.lineWidth=2; ctx.strokeRect(x+1,y+1,22,22);
    for(let k=0;k<e.maxhp;k++){ ctx.fillStyle=k<e.hp?'#7fff9f':'#444'; ctx.fillRect(x+1+k*5,y-9,3,3); } }
  if(t.ranged){ ctx.fillStyle='#ff8a3b'; ctx.fillRect(x+10,y-9,4,4); ctx.fillStyle='#ffd23b'; ctx.fillRect(x+11,y-8,2,2); }
}
function drawBoss(e){
  const x=e.x,y=e.y,w=e.w; const flash=e.flash>0&&(e.flash&1);
  ctx.fillStyle='#efe3c0';
  ctx.beginPath(); ctx.moveTo(x+8,y+2); ctx.lineTo(x-6,y-20); ctx.lineTo(x+18,y); ctx.fill();
  ctx.beginPath(); ctx.moveTo(x+w-8,y+2); ctx.lineTo(x+w+6,y-20); ctx.lineTo(x+w-18,y); ctx.fill();
  ctx.fillStyle=flash?'#fff':'#7a2bbf'; ctx.fillRect(x,y,w,e.h);
  if(e.slowT>0){ ctx.fillStyle='rgba(150,210,255,.35)'; ctx.fillRect(x,y,w,e.h); }
  ctx.fillStyle='rgba(255,255,255,.12)'; ctx.fillRect(x,y,w,6);
  ctx.fillStyle='#1a0010'; ctx.fillRect(x+8,y+14,17,4); ctx.fillRect(x+w-25,y+14,17,4);
  ctx.fillStyle='#ff3b3b'; ctx.fillRect(x+10,y+18,13,9); ctx.fillRect(x+w-23,y+18,13,9);
  ctx.fillStyle='#ffd23b'; ctx.fillRect(x+14,y+21,5,5); ctx.fillRect(x+w-19,y+21,5,5);
  ctx.fillStyle='#220006'; ctx.fillRect(x+12,y+38,w-24,11);
  ctx.fillStyle='#fff'; for(let k=0;k<4;k++) ctx.fillRect(x+15+k*9,y+38,4,6);
}
function drawStar(cx,cy,col,core,len){
  ctx.save(); ctx.translate(cx,cy); ctx.rotate(Date.now()/400); ctx.fillStyle=col;
  for(let k=0;k<4;k++){ ctx.rotate(Math.PI/2);
    ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(2,-3); ctx.lineTo(0,-len); ctx.lineTo(-2,-3); ctx.closePath(); ctx.fill(); }
  ctx.fillStyle=core; ctx.beginPath(); ctx.arc(0,0,2,0,6.29); ctx.fill(); ctx.restore();
}

function draw(){
  drawBackground();
  if(state==='play'||state==='over'){
    for(const pl of platforms) drawPlatform(pl);
    for(const l of ladders){ rect(l.x,l.y,3,l.h,'#9a7438'); rect(l.x+l.w-3,l.y,3,l.h,'#9a7438');
      for(let yy=l.y+5; yy<l.y+l.h-2; yy+=10) rect(l.x,yy,l.w,3,'#c79a52'); }
    for(const q of particles){ ctx.globalAlpha=Math.max(0,q.life/24); rect(q.x,q.y,3,3,q.c); }
    ctx.globalAlpha=1;
    // 아이템
    for(const it of items){ const cx=it.x+7,cy=it.y+7,pl=Math.sin(Date.now()/150)*1.5;
      if(it.kind==='power') drawStar(cx,cy,'#ff8a3b','#fff2c0',8+pl);
      else drawStar(cx,cy,'#ffd23b','#fff7c0',7+pl); }
    for(const e of enemies){ if(e.boss) drawBoss(e); else drawDokkaebi(e); }
    for(const s of eShots){ ctx.fillStyle='#ff7a3b'; ctx.beginPath(); ctx.arc(s.x+5,s.y+5,5,0,6.29); ctx.fill();
      ctx.fillStyle='#ffd23b'; ctx.beginPath(); ctx.arc(s.x+5,s.y+5,2.5,0,6.29); ctx.fill(); }
    for(const s of shots){ ctx.save(); ctx.translate(s.x,s.y); ctx.rotate(s.rot);
      ctx.fillStyle=(s.dmg>1)?'#ffd27f':'#dfe8f2';
      for(let k=0;k<4;k++){ ctx.rotate(Math.PI/2);
        ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(2.5,-3); ctx.lineTo(0,-9); ctx.lineTo(-2.5,-3); ctx.closePath(); ctx.fill(); }
      ctx.fillStyle='#7d8aa0'; ctx.beginPath(); ctx.arc(0,0,2.2,0,6.29); ctx.fill(); ctx.restore(); }
    const pl=player;
    if(!(pl.invuln>0 && (pl.invuln>>2)&1)){
      let pose='stand';
      if(pl.climbing) pose=((pl.walkT>>3)&1)?'walk1':'jump';
      else if(!pl.onGround) pose='jump';
      else if(pl.vx!==0) pose=((pl.walkT>>3)&1)?'walk2':'walk1';
      drawNinja(pl.x,pl.y,pl.face,pose);
    }
    const boss=enemies.find(e=>e.boss);
    if(boss){ const bw=300,bh=12,bx=W/2-bw/2,by=42;
      ctx.fillStyle='#400'; ctx.fillRect(bx-2,by-2,bw+4,bh+4);
      ctx.fillStyle='#222'; ctx.fillRect(bx,by,bw,bh);
      ctx.fillStyle='#ff4060'; ctx.fillRect(bx,by,bw*Math.max(0,boss.hp/boss.maxhp),bh);
      ctx.fillStyle='#fff'; ctx.font='11px Courier New'; ctx.textAlign='center'; ctx.fillText('👹 도깨비왕',W/2,by-5); ctx.textAlign='left'; }
  }
  if(bannerT>0){ ctx.fillStyle=bannerCol; ctx.font='bold 30px Courier New';
    ctx.textAlign='center'; ctx.fillText(bannerTxt,W/2,H/2); ctx.textAlign='left'; }
}

function loop(){ update(); draw(); requestAnimationFrame(loop); }
loop();
</script>
